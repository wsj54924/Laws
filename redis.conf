# Redis 配置文件
# 用于在 WSL 中启动 Redis 服务器

# Redis 监听地址
bind 0.0.0.0

# Redis 监听端口
port 6379

# 后台运行
daemonize yes

# 日志文件
logfile /var/log/redis/redis.log

# 日志级别
loglevel notice

# 数据库数量
databases 16

# 最大内存使用（可选）
# maxmemory 256mb

# 内存淘汰策略（可选）
# maxmemory-policy allkeys-lru

# 持久化配置
save 900 1
save 300 10
save 60 10000

# RDB 文件名
dbfilename dump.rdb

# 工作目录
dir /var/lib/redis

# AOF 持久化（可选）
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# 密码（可选，如果需要密码则取消注释）
# requirepass yourpassword

# 最大客户端连接数
maxclients 10000

# 超时时间（秒）
timeout 300
